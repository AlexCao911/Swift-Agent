name: Agent OS CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  rust-lint:
    name: Rust Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - name: Run lint gate
        run: scripts/ci/rust-lint.sh

  rust-unit:
    name: Rust Unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - name: Run unit gate
        run: scripts/ci/rust-unit.sh

  rust-contract:
    name: Rust Contract
    runs-on: ubuntu-latest
    needs:
      - rust-lint
      - rust-unit
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - name: Run contract gate
        run: scripts/ci/rust-contract.sh

  rust-golden:
    name: Rust Golden
    runs-on: ubuntu-latest
    needs:
      - rust-lint
      - rust-unit
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - name: Run golden gate
        run: scripts/ci/rust-golden.sh

  rust-integration:
    name: Rust Integration
    runs-on: ubuntu-latest
    needs:
      - rust-contract
      - rust-golden
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - name: Run integration gate
        run: scripts/ci/rust-integration.sh

  swift-bridge:
    name: Swift Bridge
    runs-on: macos-latest
    needs:
      - rust-contract
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - name: Run Swift bridge gate
        run: scripts/ci/swift-bridge.sh
